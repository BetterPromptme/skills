name: "[Test] Generate SKILL.md files"
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: self-hosted
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - uses: oven-sh/setup-bun@v2
      - run: cd builder && bun install
      - run: cd builder && bun run index.ts
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          ENVIRONMENT: staging
