name: Generate SKILL.md files
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run (leave empty for both)'
        required: false
        type: choice
        options:
          - ''
          - staging
          - production
concurrency:
  group: skillmd-gen
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  generate:
    strategy:
      max-parallel: 1
      matrix:
        environment: [staging, production]
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    if: >-
      ${{ github.event_name == 'schedule' ||
      github.event.inputs.environment == '' ||
      github.event.inputs.environment == matrix.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: cd builder && bun install
      - run: cd builder && bun run index.ts
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          ENVIRONMENT: ${{ matrix.environment }}
