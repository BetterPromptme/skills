name: Generate SKILL.md files
on:
  schedule:
    - cron: "*/15 * * * *"
concurrency:
  group: skillmd-gen
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  generate:
    strategy:
      max-parallel: 1
      matrix:
        include:
          - environment: staging
            runner: self-hosted
          - environment: production
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: cd builder && bun install
      - run: cd builder && bun run index.ts
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          ENVIRONMENT: ${{ matrix.environment }}
