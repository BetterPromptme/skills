name: Generate SKILL.md files
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run (leave empty for both)"
        required: false
        type: choice
        options:
          - ""
          - staging
          - production
concurrency:
  group: skillmd-gen
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  setup:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      environments: ${{ steps.set-matrix.outputs.environments }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ -z "${{ github.event.inputs.environment }}" ]]; then
            echo 'environments=["staging","production"]' >> "$GITHUB_OUTPUT"
          else
            echo 'environments=["${{ github.event.inputs.environment }}"]' >> "$GITHUB_OUTPUT"
          fi
  generate:
    needs: setup
    strategy:
      max-parallel: 1
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.environments) }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: cd builder && bun install
      - run: cd builder && bun run index.ts
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          ENVIRONMENT: ${{ matrix.environment }}
